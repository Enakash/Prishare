<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>פירות השכונה</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; direction: rtl; background: #F7F3EC; color: #2C2416; }

    .header {
      background: #2C6E35; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 64px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-logo { display: flex; align-items: center; gap: 10px; }
    .header-title { color: #fff; font-size: 20px; font-weight: 800; }
    .header-subtitle { color: rgba(255,255,255,0.7); font-size: 12px; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #4CAF50; box-shadow: 0 0 0 3px rgba(76,175,80,0.3); }

    .nav { background: #fff; border-bottom: 2px solid #E8E0D0; display: flex; }
    .nav-tab {
      flex: 1; padding: 14px 8px; text-align: center; cursor: pointer;
      font-size: 15px; font-weight: 600; color: #888; border: none;
      background: transparent; border-bottom: 3px solid transparent;
      transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
      font-family: 'Heebo', sans-serif;
    }
    .nav-tab.active { color: #2C6E35; border-bottom-color: #2C6E35; background: #F7FBF7; }

    .main { max-width: 680px; margin: 0 auto; padding: 24px 16px; }
    .page { display: none; }
    .page.active { display: block; }

    .hero {
      background: linear-gradient(135deg, #2C6E35 0%, #4A9B56 100%);
      border-radius: 16px; padding: 28px 24px; margin-bottom: 24px;
      color: white; position: relative; overflow: hidden;
    }
    .hero::after {
      content: '🌳'; position: absolute; left: 20px; bottom: -10px;
      font-size: 80px; opacity: 0.15; line-height: 1;
    }
    .hero h2 { font-size: 22px; font-weight: 800; margin-bottom: 6px; }
    .hero p { font-size: 14px; opacity: 0.85; line-height: 1.6; max-width: 320px; }
    .hero-stats { display: flex; gap: 20px; margin-top: 16px; }
    .hero-stat { text-align: center; }
    .hero-stat-num { font-size: 26px; font-weight: 800; line-height: 1; }
    .hero-stat-label { font-size: 11px; opacity: 0.75; margin-top: 2px; }

    .section-title { font-size: 17px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

    .tree-card {
      background: #fff; border-radius: 14px; padding: 18px;
      margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      border: 1.5px solid #EDE6D8;
    }
    .tree-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
    .fruit-badge {
      background: #EEF7EE; color: #2C6E35; font-size: 13px; font-weight: 700;
      padding: 4px 10px; border-radius: 20px; border: 1px solid #C8E0C8;
    }
    .available-row { display: flex; align-items: center; gap: 6px; }
    .available-dot { width: 8px; height: 8px; border-radius: 50%; background: #4CAF50; box-shadow: 0 0 0 3px rgba(76,175,80,0.2); }
    .tree-meta { font-size: 13px; color: #666; margin-bottom: 5px; }
    .tree-desc { font-size: 14px; color: #444; line-height: 1.55; margin-bottom: 10px; }
    .tree-footer { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .qty-tag { font-size: 12px; color: #888; background: #F5F0E8; padding: 3px 10px; border-radius: 20px; }
    .requests-count { font-size: 12px; color: #C07820; font-weight: 600; }

    .btn {
      padding: 10px 20px; border-radius: 10px; border: none; cursor: pointer;
      font-size: 14px; font-weight: 700; font-family: 'Heebo', sans-serif;
      transition: all 0.18s; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: #2C6E35; color: #fff; }
    .btn-primary:hover { background: #225629; }
    .btn-secondary { background: #F0EBE0; color: #2C2416; }
    .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: 8px; }
    .btn-danger { background: #FFF0F0; color: #C0392B; border: 1px solid #FFCDD2; }
    .btn-full { width: 100%; justify-content: center; }

    .form-card {
      background: #fff; border-radius: 14px; padding: 22px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1.5px solid #EDE6D8; margin-bottom: 20px;
    }
    .form-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .form-row { margin-bottom: 14px; }
    .form-label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 5px; }
    .form-input, .form-select, .form-textarea {
      width: 100%; padding: 10px 13px; border-radius: 9px;
      border: 1.5px solid #DDD8CC; font-size: 14px; font-family: 'Heebo', sans-serif;
      background: #FDFBF8; color: #2C2416; direction: rtl;
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      outline: none; border-color: #2C6E35;
      box-shadow: 0 0 0 3px rgba(44,110,53,0.1);
    }
    .form-textarea { resize: vertical; min-height: 80px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      align-items: center; justify-content: center; z-index: 200; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 18px; padding: 26px;
      width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
    .modal-sub { font-size: 13px; color: #888; margin-bottom: 18px; }
    .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
    .modal-actions .btn { flex: 1; justify-content: center; }

    .toast {
      display: none; position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #2C6E35; color: #fff; padding: 12px 22px;
      border-radius: 30px; font-size: 14px; font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2); z-index: 300;
    }
    .toast.error { background: #C0392B; }

    .my-tree-card {
      background: #fff; border-radius: 14px; overflow: hidden;
      margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border: 1.5px solid #EDE6D8;
    }
    .my-tree-header {
      background: linear-gradient(135deg, #2C6E35, #4A9B56);
      padding: 14px 18px; color: white;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;
    }
    .my-tree-title { font-size: 15px; font-weight: 700; }
    .my-tree-body { padding: 14px 18px; }
    .request-badge {
      background: rgba(255,255,255,0.25); color: white;
      font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    }
    .request-item {
      background: #F7F3EC; border-radius: 10px; padding: 12px 14px;
      margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
      border: 1px solid #EDE6D8; gap: 10px;
    }
    .request-name { font-weight: 700; font-size: 13px; }
    .request-msg { color: #666; font-size: 13px; margin-top: 2px; }
    .request-phone { color: #2C6E35; font-weight: 600; font-size: 13px; }

    .empty { text-align: center; padding: 48px 20px; }
    .empty-icon { font-size: 52px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; font-weight: 600; color: #999; }
    .empty-sub { font-size: 13px; color: #bbb; margin-top: 6px; }
    .loading { text-align: center; padding: 40px; color: #888; font-size: 15px; }

    @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="header">
  <div class="header-logo">
    <span style="font-size:26px">🌳</span>
    <div>
      <div class="header-title">פירות השכונה</div>
      <div class="header-subtitle">שיתוף פירות בין שכנים</div>
    </div>
  </div>
  <div class="status-dot"></div>
</header>

<nav class="nav">
  <button class="nav-tab active" onclick="showTab('browse')">🔍 עצים זמינים</button>
  <button class="nav-tab" onclick="showTab('owner')">🌱 בעל עץ</button>
  <button class="nav-tab" onclick="showTab('dashboard')">📋 ניהול</button>
</nav>

<main class="main">

  <!-- BROWSE -->
  <div id="page-browse" class="page active">
    <div class="hero">
      <h2>פירות טריים מהשכונה 🍊</h2>
      <p>בעלי עצים מציעים פירות לקטיף — שלח בקשה וקבע מועד עם השכן שלך</p>
      <div class="hero-stats">
        <div class="hero-stat"><div class="hero-stat-num" id="stat-available">0</div><div class="hero-stat-label">עצים זמינים</div></div>
        <div class="hero-stat"><div class="hero-stat-num" id="stat-requests">0</div><div class="hero-stat-label">בקשות קטיף</div></div>
        <div class="hero-stat"><div class="hero-stat-num" id="stat-total">0</div><div class="hero-stat-label">סה"כ עצים</div></div>
      </div>
    </div>
    <div class="section-title"><span>🌿</span> עצים זמינים לקטיף</div>
    <div id="trees-list"><div class="loading">⏳ טוען עצים...</div></div>
  </div>

  <!-- OWNER -->
  <div id="page-owner" class="page">
    <div class="section-title"><span>🌱</span> הוסף עץ שלך</div>
    <div class="form-card">
      <div class="form-title">🌳 פרטי העץ</div>
      <div class="form-grid">
        <div class="form-row">
          <label class="form-label">שמך המלא *</label>
          <input class="form-input" id="o-name" placeholder="יוסי ישראלי" />
        </div>
        <div class="form-row">
          <label class="form-label">טלפון ליצירת קשר *</label>
          <input class="form-input" id="o-phone" placeholder="050-0000000" />
        </div>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label class="form-label">סוג פרי *</label>
          <select class="form-select" id="o-fruit">
            <option>תפוח 🍎</option><option>תפוז 🍊</option><option selected>לימון 🍋</option>
            <option>אגס 🍐</option><option>ענב 🍇</option><option>תאנה 🫐</option>
            <option>שזיף 🍑</option><option>אבוקדו 🥑</option><option>זית 🫒</option><option>אחר 🌿</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">כתובת *</label>
        <input class="form-input" id="o-address" placeholder="רחוב, מספר בית" />
      </div>
      <div class="form-row">
        <label class="form-label">כמות משוערת</label>
        <input class="form-input" id="o-quantity" placeholder="~20 לימונים" />
      </div>
      <div class="form-row">
        <label class="form-label">תיאור</label>
        <textarea class="form-textarea" id="o-desc" placeholder="ספר על הפירות — מתי הם בשלים, שעות נוחות..."></textarea>
      </div>
      <button class="btn btn-primary btn-full" onclick="addTree()">🌳 פרסם את העץ שלך</button>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="page-dashboard" class="page">
    <div class="section-title"><span>📋</span> ניהול עצים ובקשות</div>
    <div id="dashboard-list"><div class="loading">⏳ טוען...</div></div>
  </div>

</main>

<!-- REQUEST MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">🌿 בקשת קטיף</div>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="form-row">
      <label class="form-label">שמך המלא *</label>
      <input class="form-input" id="r-name" placeholder="שם מלא" />
    </div>
    <div class="form-row">
      <label class="form-label">מספר טלפון *</label>
      <input class="form-input" id="r-phone" placeholder="050-0000000" />
    </div>
    <div class="form-row">
      <label class="form-label">הערה (אופציונלי)</label>
      <textarea class="form-textarea" id="r-msg" rows="2" placeholder="זמין בסופי שבוע..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">ביטול</button>
      <button class="btn btn-primary" onclick="submitRequest()">שלח בקשה 🌿</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const SUPABASE_URL = "https://obrmyjygitkbaipqdcqb.supabase.co";
  const SUPABASE_KEY = "sb_publishable_UxLyGsF4PlFOIF3OXJgbSg_hh5MA_oM";

  const FRUIT_EMOJIS = {
    "תפוח": "🍎","תפוז": "🍊","לימון": "🍋","אגס": "🍐",
    "ענב": "🍇","תאנה": "🫐","שזיף": "🍑","אבוקדו": "🥑","זית": "🫒","אחר": "🌿"
  };

  let trees = [];
  let currentTreeId = null;

  async function sbFetch(path, options = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": `Bearer ${SUPABASE_KEY}`,
        "Content-Type": "application/json",
        "Prefer": options.prefer || "return=representation",
        ...options.headers
      },
      ...options
    });
    const text = await res.text();
    return text ? JSON.parse(text) : null;
  }

  async function loadTrees() {
    try {
      trees = await sbFetch("trees?select=*,requests(*)&order=created_at.desc") || [];
      renderBrowse();
      renderDashboard();
      updateStats();
    } catch(e) {
      showToast("שגיאה בטעינת הנתונים", true);
    }
  }

  function updateStats() {
    const available = trees.filter(t => t.available).length;
    const reqs = trees.reduce((s, t) => s + (t.requests?.length || 0), 0);
    document.getElementById("stat-available").textContent = available;
    document.getElementById("stat-requests").textContent = reqs;
    document.getElementById("stat-total").textContent = trees.length;
  }

  function getFruitEmoji(fruit) {
    for (const [key, val] of Object.entries(FRUIT_EMOJIS)) {
      if (fruit && fruit.includes(key)) return val;
    }
    return "🌿";
  }

  function renderBrowse() {
    const available = trees.filter(t => t.available);
    const el = document.getElementById("trees-list");
    if (available.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">🌾</div><div class="empty-text">אין עצים זמינים כרגע</div><div class="empty-sub">בדוק שוב מאוחר יותר</div></div>`;
      return;
    }
    el.innerHTML = available.map(tree => `
      <div class="tree-card">
        <div class="tree-card-header">
          <div style="display:flex;align-items:center;gap:8px">
            <span style="font-size:28px">${getFruitEmoji(tree.fruit)}</span>
            <span class="fruit-badge">${tree.fruit}</span>
          </div>
          <div class="available-row">
            <div class="available-dot"></div>
            <span style="font-size:12px;color:#4CAF50;font-weight:600">זמין</span>
          </div>
        </div>
        <div class="tree-meta">📍 ${tree.address}</div>
        <div class="tree-meta">👤 ${tree.owner_name}</div>
        ${tree.owner_phone ? `<div class="tree-meta" style="color:#2C6E35;font-weight:600">📞 ${tree.owner_phone}</div>` : ""}
        ${tree.description ? `<div class="tree-desc">${tree.description}</div>` : ""}
        <div class="tree-footer">
          <div style="display:flex;gap:8px;align-items:center">
            ${tree.quantity ? `<span class="qty-tag">כמות: ${tree.quantity}</span>` : ""}
            ${tree.requests?.length ? `<span class="requests-count">⏳ ${tree.requests.length} בקשות</span>` : ""}
          </div>
          <button class="btn btn-primary btn-sm" onclick="openModal('${tree.id}')">🌿 בקש לקטוף</button>
        </div>
      </div>
    `).join("");
  }

  function renderDashboard() {
    const el = document.getElementById("dashboard-list");
    if (trees.length === 0) {
      el.innerHTML = `<div class="empty"><div class="empty-icon">🌱</div><div class="empty-text">אין עצים עדיין</div><div class="empty-sub">עבור ל"בעל עץ" כדי להוסיף</div></div>`;
      return;
    }
    el.innerHTML = trees.map(tree => `
      <div class="my-tree-card">
        <div class="my-tree-header">
          <div class="my-tree-title">${getFruitEmoji(tree.fruit)} ${tree.fruit} — ${tree.address}</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            ${tree.requests?.length ? `<span class="request-badge">${tree.requests.length} בקשות</span>` : ""}
            <button onclick="toggleAvailable('${tree.id}', ${tree.available})"
              style="background:rgba(255,255,255,0.2);color:white;border:1px solid rgba(255,255,255,0.4);font-size:12px;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700">
              ${tree.available ? "✅ זמין" : "❌ לא זמין"}
            </button>
            <button onclick="deleteTree('${tree.id}')"
              style="background:rgba(220,50,50,0.25);color:white;border:1px solid rgba(255,150,150,0.4);font-size:12px;padding:4px 10px;border-radius:8px;cursor:pointer;font-family:'Heebo',sans-serif;font-weight:700">
              🗑️ הסר
            </button>
          </div>
        </div>
        <div class="my-tree-body">
          <div style="font-size:13px;color:#666;margin-bottom:10px">👤 ${tree.owner_name} ${tree.quantity ? "· " + tree.quantity : ""}</div>
          ${!tree.requests?.length
            ? `<div style="font-size:13px;color:#bbb;padding:8px 0">עדיין אין בקשות קטיף</div>`
            : tree.requests.map(req => `
              <div class="request-item">
                <div>
                  <div class="request-name">🌿 ${req.requester_name}</div>
                  ${req.message ? `<div class="request-msg">"${req.message}"</div>` : ""}
                  <div class="request-phone">📞 ${req.phone}</div>
                </div>
                <button class="btn btn-danger btn-sm" onclick="deleteRequest('${req.id}')">סגור</button>
              </div>
            `).join("")
          }
        </div>
      </div>
    `).join("");
  }

  function showTab(name) {
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
    document.getElementById("page-" + name).classList.add("active");
    event.currentTarget.classList.add("active");
  }

  function openModal(treeId) {
    currentTreeId = treeId;
    const tree = trees.find(t => t.id === treeId);
    document.getElementById("modal-title").textContent = getFruitEmoji(tree.fruit) + " בקשת קטיף";
    document.getElementById("modal-sub").textContent = `${tree.fruit} אצל ${tree.owner_name} · ${tree.address}`;
    document.getElementById("r-name").value = "";
    document.getElementById("r-phone").value = "";
    document.getElementById("r-msg").value = "";
    document.getElementById("modal").classList.add("open");
  }

  function closeModal() {
    document.getElementById("modal").classList.remove("open");
    currentTreeId = null;
  }

  async function submitRequest() {
    const name = document.getElementById("r-name").value.trim();
    const phone = document.getElementById("r-phone").value.trim();
    const msg = document.getElementById("r-msg").value.trim();
    if (!name || !phone) { showToast("נא למלא שם וטלפון", true); return; }
    try {
      await sbFetch("requests", { method: "POST", body: JSON.stringify({ tree_id: currentTreeId, requester_name: name, phone, message: msg }) });
      closeModal();
      await loadTrees();
      showToast("✅ בקשת הקטיף נשלחה בהצלחה!");
    } catch(e) { showToast("שגיאה בשליחת הבקשה", true); }
  }

  async function addTree() {
    const name = document.getElementById("o-name").value.trim();
    const phone = document.getElementById("o-phone").value.trim();
    const fruit = document.getElementById("o-fruit").value.replace(/ .+/, "");
    const address = document.getElementById("o-address").value.trim();
    const quantity = document.getElementById("o-quantity").value.trim();
    const description = document.getElementById("o-desc").value.trim();
    if (!name || !address || !phone) { showToast("נא למלא שם, טלפון וכתובת", true); return; }
    try {
      await sbFetch("trees", { method: "POST", body: JSON.stringify({ owner_name: name, owner_phone: phone, fruit, address, quantity, description }) });
      document.getElementById("o-name").value = "";
      document.getElementById("o-phone").value = "";
      document.getElementById("o-address").value = "";
      document.getElementById("o-quantity").value = "";
      document.getElementById("o-desc").value = "";
      await loadTrees();
      showToast("🌳 העץ שלך פורסם בהצלחה!");
    } catch(e) { showToast("שגיאה בפרסום העץ", true); }
  }

  async function toggleAvailable(id, current) {
    try {
      await sbFetch(`trees?id=eq.${id}`, { method: "PATCH", body: JSON.stringify({ available: !current }) });
      await loadTrees();
    } catch(e) { showToast("שגיאה בעדכון", true); }
  }

  async function deleteTree(id) {
    if (!confirm("האם למחוק את העץ הזה? כל הבקשות שלו יימחקו גם כן.")) return;
    try {
      await sbFetch(`requests?tree_id=eq.${id}`, { method: "DELETE", prefer: "return=minimal" });
      await sbFetch(`trees?id=eq.${id}`, { method: "DELETE", prefer: "return=minimal" });
      await loadTrees();
      showToast("✅ העץ הוסר בהצלחה");
    } catch(e) { showToast("שגיאה בהסרת העץ", true); }
  }

  async function deleteRequest(id) {
    try {
      await sbFetch(`requests?id=eq.${id}`, { method: "DELETE", prefer: "return=minimal" });
      await loadTrees();
      showToast("✅ הבקשה הוסרה");
    } catch(e) { showToast("שגיאה בהסרת הבקשה", true); }
  }

  function showToast(msg, isError = false) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "toast" + (isError ? " error" : "");
    el.style.display = "block";
    setTimeout(() => el.style.display = "none", 3000);
  }

  document.getElementById("modal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });

  loadTrees();
</script>
</body>
</html>
